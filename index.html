<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>again</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    .heart {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 120px;
      line-height: 1;
      z-index: 10;
    }

    .top-text {
      position: fixed;
      top: 150px;
      left: 24px;
      font-size: 10px;
      opacity: 0.6;
      line-height: 1.4;
      z-index: 10;
    }

    .study-link {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90vw;
      max-width: 520px;
      cursor: pointer;
      z-index: 20;
    }

    .study-img {
      width: 100%;
      height: auto;
      opacity: 0.92;
      transition: transform 0.2s ease, opacity 0.2s ease;
      display: block;
    }

    .study-link:hover .study-img {
      opacity: 1;
      transform: scale(1.015);
    }

    .study-img.clicked {
      animation: studyClick 0.55s ease forwards;
    }

    @keyframes studyClick {
      0% { transform: scale(1) rotate(0deg); }
      35% { transform: scale(1.04) rotate(-2deg); }
      70% { transform: scale(0.97) rotate(2deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    #skelly {
      position: fixed;
      width: 90px;
      left: 70vw;
      top: 65vh;
      opacity: 0.85;
      z-index: 30;
      cursor: grab;
      user-select: none;
      -webkit-user-drag: none;
      transition: filter 0.15s ease, opacity 0.15s ease;
    }

    #skelly:hover {
      opacity: 1;
      filter: invert(1);
    }

    #skelly.dragging {
      cursor: grabbing;
      filter: invert(1);
    }

    #skelly.freak {
      animation: skellyFreak 0.75s ease-in-out forwards;
    }

    @keyframes skellyFreak {
      0% { transform: scale(1) rotate(0deg); filter: invert(0); opacity: 1; }
      15% { transform: scale(1.6) rotate(30deg); filter: invert(1); }
      35% { transform: scale(0.8) rotate(-45deg); filter: invert(0); }
      55% { transform: scale(1.7) rotate(70deg); filter: invert(1); }
      75% { transform: scale(1.1) rotate(-25deg); filter: invert(0); }
      100% { transform: scale(0.7) rotate(360deg); filter: invert(1); opacity: 0; }
    }

    #flash {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      transition: opacity 0.08s ease;
    }

    @media (max-width: 600px) {
      .heart {
        font-size: 82px;
        top: 16px;
        left: 16px;
      }

      .top-text {
        top: 110px;
        left: 20px;
      }

      .study-link {
        width: 92vw;
      }

      #skelly {
        width: 70px;
      }
    }
  </style>
</head>

<body>

  <div class="heart">♡</div>

  <div class="top-text">
    <div>hi, this site is a work in progress</div>
    <div>come back later</div>
  </div>

  <div class="study-link" onclick="goStudy()">
    <img src="study.png" class="study-img" id="studyImg" alt="too busy studying">
  </div>

  <img src="skelly.png" id="skelly" alt="">

  <div id="flash"></div>

  <script>
    const skelly = document.getElementById("skelly");

    let x = window.innerWidth * 0.7;
    let y = window.innerHeight * 0.65;
    let dx = 1.4;
    let dy = 1.1;
    let dragging = false;
    let offsetX = 0;
    let offsetY = 0;

    function bounceSkelly() {
      if (!dragging) {
        x += dx;
        y += dy;

        const rect = skelly.getBoundingClientRect();
        const w = rect.width || 90;
        const h = rect.height || 90;

        if (x <= 0 || x + w >= window.innerWidth) dx *= -1;
        if (y <= 0 || y + h >= window.innerHeight) dy *= -1;

        skelly.style.left = x + "px";
        skelly.style.top = y + "px";
      }

      requestAnimationFrame(bounceSkelly);
    }

    skelly.addEventListener("mousedown", (e) => {
      dragging = true;
      skelly.classList.add("dragging");
      offsetX = e.clientX - skelly.offsetLeft;
      offsetY = e.clientY - skelly.offsetTop;
    });

    window.addEventListener("mousemove", (e) => {
      if (!dragging) return;
      x = e.clientX - offsetX;
      y = e.clientY - offsetY;
      skelly.style.left = x + "px";
      skelly.style.top = y + "px";
    });

    window.addEventListener("mouseup", () => {
      dragging = false;
      skelly.classList.remove("dragging");
    });

    skelly.addEventListener("touchstart", (e) => {
      dragging = true;
      const touch = e.touches[0];
      offsetX = touch.clientX - skelly.offsetLeft;
      offsetY = touch.clientY - skelly.offsetTop;
    });

    window.addEventListener("touchmove", (e) => {
      if (!dragging) return;
      const touch = e.touches[0];
      x = touch.clientX - offsetX;
      y = touch.clientY - offsetY;
      skelly.style.left = x + "px";
      skelly.style.top = y + "px";
    });

    window.addEventListener("touchend", () => {
      dragging = false;
    });

    function goStudy() {
      const img = document.getElementById("studyImg");
      const flash = document.getElementById("flash");

      img.classList.add("clicked");
      skelly.classList.add("freak");

      flash.style.opacity = "1";

      setTimeout(() => {
        flash.style.opacity = "0";
      }, 90);

      setTimeout(() => {
        window.location.href = "https://haylortall.github.io/ap2final/";
      }, 750);
    }

    bounceSkelly();
  </script>

</body>
</html>
