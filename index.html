<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>again</title>

  <style>
    body {
      margin: 0;
      background: #f6f3ea;
      color: black;
      font-family: sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    .heart {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 120px;
      line-height: 1;
      z-index: 10;
      color: black;
    }

    .top-text {
      position: fixed;
      top: 150px;
      left: 28px;
      font-size: 10px;
      opacity: 0.65;
      line-height: 1.4;
      z-index: 10;
      color: black;
    }

    .study-link {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90vw;
      max-width: 520px;
      cursor: pointer;
      z-index: 20;
    }

    .study-img {
      width: 100%;
      height: auto;
      opacity: 0.94;
      display: block;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .study-link:hover .study-img {
      opacity: 1;
      transform: scale(1.015);
    }

    .study-img.clicked {
      animation: studyClick 0.7s ease forwards;
    }

    @keyframes studyClick {
      0% { transform: scale(1) rotate(0deg); }
      35% { transform: scale(1.06) rotate(-3deg); }
      70% { transform: scale(0.96) rotate(3deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    #skelly {
      position: fixed;
      width: 90px;
      left: 70vw;
      top: 65vh;
      opacity: 0.85;
      z-index: 30;
      cursor: grab;
      user-select: none;
      -webkit-user-drag: none;
      transition: filter 0.15s ease, opacity 0.15s ease;
    }

    #skelly:hover {
      opacity: 1;
      filter: invert(1);
    }

    #skelly.dragging {
      cursor: grabbing;
      filter: invert(1);
    }

    #skelly.freak {
      left: 50% !important;
      top: 50% !important;
      opacity: 1;
      pointer-events: none;
      animation: skellyChaos 5s linear forwards;
    }

    @keyframes skellyChaos {
      0% {
        transform: translate(-50%, -50%) scale(0.7) rotate(0deg);
        filter: invert(0) contrast(1);
      }
      8% {
        transform: translate(-50%, -50%) scale(1.8) rotate(45deg);
        filter: invert(1) contrast(2);
      }
      16% {
        transform: translate(-50%, -50%) scale(0.9) rotate(-80deg);
        filter: invert(0) contrast(3);
      }
      24% {
        transform: translate(-50%, -50%) scale(2.2) rotate(130deg);
        filter: invert(1) contrast(2);
      }
      32% {
        transform: translate(-50%, -50%) scale(1.1) rotate(-170deg);
        filter: invert(0) contrast(4);
      }
      40% {
        transform: translate(-50%, -50%) scale(2.5) rotate(240deg);
        filter: invert(1) contrast(3);
      }
      50% {
        transform: translate(-50%, -50%) scale(1.4) rotate(-300deg);
        filter: invert(0) contrast(5);
      }
      60% {
        transform: translate(-50%, -50%) scale(2.8) rotate(420deg);
        filter: invert(1) contrast(4);
      }
      72% {
        transform: translate(-50%, -50%) scale(1.2) rotate(-520deg);
        filter: invert(0) contrast(2);
      }
      86% {
        transform: translate(-50%, -50%) scale(2.1) rotate(700deg);
        filter: invert(1) contrast(5);
      }
      100% {
        transform: translate(-50%, -50%) scale(0.2) rotate(1080deg);
        filter: invert(1) contrast(8);
        opacity: 0;
      }
    }

    #flash {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      transition: opacity 0.08s ease;
    }

    .symbol {
      position: fixed;
      left: 50%;
      top: 50%;
      font-size: 28px;
      z-index: 997;
      pointer-events: none;
      animation: symbolBurst 1.2s ease-out forwards;
    }

    @keyframes symbolBurst {
      0% {
        transform: translate(-50%, -50%) scale(0.2) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform:
          translate(calc(-50% + var(--x)), calc(-50% + var(--y)))
          scale(1.8)
          rotate(var(--r));
        opacity: 0;
      }
    }

    @media (max-width: 600px) {
      .heart {
        font-size: 82px;
        top: 16px;
        left: 16px;
      }

      .top-text {
        top: 108px;
        left: 20px;
      }

      .study-link {
        width: 92vw;
      }

      #skelly {
        width: 70px;
      }

      #skelly.freak {
        width: 105px;
      }
    }
  </style>
</head>

<body>

  <div class="heart">♡</div>

  <div class="top-text">
    <div>hi, this site is a work in progress</div>
    <div>come back later</div>
  </div>

  <div class="study-link" onclick="goStudy()">
    <img src="study.png" class="study-img" id="studyImg" alt="too busy studying">
  </div>

  <img src="skelly.png" id="skelly" alt="">

  <div id="flash"></div>

  <script>
    const skelly = document.getElementById("skelly");

    let x = window.innerWidth * 0.7;
    let y = window.innerHeight * 0.65;
    let dx = 1.4;
    let dy = 1.1;
    let dragging = false;
    let chaosStarted = false;
    let offsetX = 0;
    let offsetY = 0;

    function bounceSkelly() {
      if (!dragging && !chaosStarted) {
        x += dx;
        y += dy;

        const rect = skelly.getBoundingClientRect();
        const w = rect.width || 90;
        const h = rect.height || 90;

        if (x <= 0 || x + w >= window.innerWidth) dx *= -1;
        if (y <= 0 || y + h >= window.innerHeight) dy *= -1;

        skelly.style.left = x + "px";
        skelly.style.top = y + "px";
      }

      requestAnimationFrame(bounceSkelly);
    }

    skelly.addEventListener("mousedown", (e) => {
      if (chaosStarted) return;
      dragging = true;
      skelly.classList.add("dragging");
      offsetX = e.clientX - skelly.offsetLeft;
      offsetY = e.clientY - skelly.offsetTop;
    });

    window.addEventListener("mousemove", (e) => {
      if (!dragging || chaosStarted) return;
      x = e.clientX - offsetX;
      y = e.clientY - offsetY;
      skelly.style.left = x + "px";
      skelly.style.top = y + "px";
    });

    window.addEventListener("mouseup", () => {
      dragging = false;
      skelly.classList.remove("dragging");
    });

    skelly.addEventListener("touchstart", (e) => {
      if (chaosStarted) return;
      dragging = true;
      const touch = e.touches[0];
      offsetX = touch.clientX - skelly.offsetLeft;
      offsetY = touch.clientY - skelly.offsetTop;
    });

    window.addEventListener("touchmove", (e) => {
      if (!dragging || chaosStarted) return;
      const touch = e.touches[0];
      x = touch.clientX - offsetX;
      y = touch.clientY - offsetY;
      skelly.style.left = x + "px";
      skelly.style.top = y + "px";
    });

    window.addEventListener("touchend", () => {
      dragging = false;
    });

    function burstSymbols() {
      const symbols = ["✶", "✦", "✷", "✹", "♡", "!", "?", "☠", "✧", "★", "AP2", "help"];
      for (let i = 0; i < 42; i++) {
        const el = document.createElement("div");
        el.className = "symbol";
        el.textContent = symbols[Math.floor(Math.random() * symbols.length)];

        const angle = Math.random() * Math.PI * 2;
        const distance = 80 + Math.random() * 360;
        const x = Math.cos(angle) * distance;
        const y = Math.sin(angle) * distance;
        const r = (Math.random() * 720 - 360) + "deg";

        el.style.setProperty("--x", x + "px");
        el.style.setProperty("--y", y + "px");
        el.style.setProperty("--r", r);
        el.style.animationDelay = (Math.random() * 0.25) + "s";

        document.body.appendChild(el);

        setTimeout(() => el.remove(), 1600);
      }
    }

    function goStudy() {
      if (chaosStarted) return;
      chaosStarted = true;

      const img = document.getElementById("studyImg");
      const flash = document.getElementById("flash");

      img.classList.add("clicked");
      skelly.classList.add("freak");

      flash.style.opacity = "1";
      setTimeout(() => {
        flash.style.opacity = "0";
      }, 250);

      burstSymbols();

      setTimeout(burstSymbols, 900);
      setTimeout(burstSymbols, 1800);
      setTimeout(burstSymbols, 2900);

      setTimeout(() => {
        window.location.href = "https://haylortall.github.io/ap2final/";
      }, 5000);
    }

    bounceSkelly();
  </script>

</body>
</html>
